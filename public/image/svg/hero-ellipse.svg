<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 840" preserveAspectRatio="none">
  <style>
    .arc {
      fill: none;
      stroke: #050505;
      stroke-width: 2;
      stroke-linecap: round;
      path-length: 1;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: drawEllipse 1.35s cubic-bezier(0.76, 0, 0.24, 1) 0.15s forwards;
    }

    @keyframes drawEllipse {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
  <path class="arc" pathLength="1" d="M 500 2 A 498 418 0 0 0 500 838" />
  <path class="arc" pathLength="1" d="M 500 2 A 498 418 0 0 1 500 838" />
</svg>
